<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Patungan Diskon Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4 font-sans text-slate-800">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <div class="bg-indigo-600 p-6 sm:p-8 text-center">
            <h2 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">Kalkulator Patungan</h2>
            <p class="text-indigo-200 mt-2 text-sm sm:text-base">Bagi harga diskon dengan adil dan proporsional</p>
        </div>

        <div class="p-6 sm:p-8 space-y-8">
            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Total Tagihan Setelah Diskon</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="text-slate-500 font-semibold">Rp</span>
                    </div>
                    <input type="number" id="totalTagihan" class="w-full pl-12 pr-4 py-3 bg-white border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-lg font-semibold text-slate-800 placeholder-slate-400" placeholder="Contoh: 24700">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end mb-4">
                    <h3 class="text-lg font-bold text-slate-800">Daftar Item</h3>
                    <button onclick="tambahItem()" class="flex items-center gap-1 text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition-colors bg-indigo-50 px-3 py-1.5 rounded-lg">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                        Tambah Baru
                    </button>
                </div>
                
                <div id="containerItem" class="space-y-3">
                    </div>
            </div>

            <button onclick="hitungPatungan()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition-all duration-200 flex justify-center items-center gap-2 text-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                Hitung Sekarang
            </button>

            <div id="hasilDiv" class="hidden fade-in bg-indigo-50/50 border border-indigo-100 rounded-2xl p-6">
                <h3 class="text-lg font-bold text-indigo-900 mb-4 border-b border-indigo-200 pb-2">Rincian Pembayaran</h3>
                <div id="listHasil" class="space-y-3 mb-4">
                    </div>
                
                <div class="mt-4 pt-4 border-t-2 border-indigo-200/60 flex justify-between items-center">
                    <span class="text-indigo-800 font-medium">Total Harga Asli:</span>
                    <span id="totalAsliText" class="font-bold text-slate-700">Rp 0</span>
                </div>
                <div class="mt-2 flex justify-between items-center text-lg">
                    <span class="text-indigo-900 font-bold">Total Terkumpul:</span>
                    <span id="totalTerkumpulText" class="font-extrabold text-indigo-700">Rp 0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let counterItemId = 0;

        // Inisialisasi: Buat 2 item pertama
        window.onload = () => {
            tambahItem();
            tambahItem();
        };

        // Fungsi Tambah Item (Bisa dipanggil biasa, atau dipanggil oleh fungsi Copy)
        function tambahItem(namaDefault = '', hargaDefault = '', insertAfterElement = null) {
            counterItemId++;
            const id = `item-${counterItemId}`;
            
            // Jika nama kosong, beri nama default berdasarkan jumlah baris saat ini
            const currentTotalRows = document.querySelectorAll('.item-row').length;
            const namaFix = namaDefault || `Item ${currentTotalRows + 1}`;
            
            const divRow = document.createElement('div');
            divRow.className = "item-row flex flex-wrap sm:flex-nowrap items-center gap-2 bg-white p-2 rounded-xl border border-slate-200 shadow-sm transition-all focus-within:border-indigo-400 focus-within:ring-1 focus-within:ring-indigo-400";
            divRow.id = id;
            
            divRow.innerHTML = `
                <div class="w-full sm:w-1/3">
                    <input type="text" class="input-nama w-full px-3 py-2 bg-slate-50 hover:bg-slate-100 border border-transparent focus:border-indigo-300 focus:bg-white rounded-lg text-sm text-slate-700 font-semibold transition-colors focus:outline-none" value="${namaFix}" placeholder="Nama item...">
                </div>
                
                <div class="flex-grow w-full sm:w-auto">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="text-slate-400 text-sm font-medium">Rp</span>
                        </div>
                        <input type="number" class="input-harga w-full pl-9 pr-3 py-2 bg-transparent border-none focus:ring-0 text-slate-700 font-medium" placeholder="Harga Asli..." value="${hargaDefault}">
                    </div>
                </div>

                <div class="flex gap-1 ml-auto">
                    <button onclick="copyItem('${id}')" class="p-2 text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-colors" title="Duplikat Item">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                    <button onclick="hapusItem('${id}')" class="p-2 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors" title="Hapus Item">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `;
            
            // Logika penempatan: jika disisipkan setelah elemen tertentu (hasil copy)
            if (insertAfterElement) {
                insertAfterElement.insertAdjacentElement('afterend', divRow);
            } else {
                document.getElementById('containerItem').appendChild(divRow);
            }
        }

        function copyItem(id) {
            const row = document.getElementById(id);
            const namaSekarang = row.querySelector('.input-nama').value;
            const hargaSekarang = row.querySelector('.input-harga').value;
            
            let namaBaru = namaSekarang;
            
            // Deteksi apakah nama berakhiran " (angka)" menggunakan Regex
            const regex = /\s\((\d+)\)$/;
            const kecocokan = namaBaru.match(regex);
            
            if (kecocokan) {
                // Jika sudah ada (1), maka ubah jadi (2), dst
                const angkaBaru = parseInt(kecocokan[1]) + 1;
                namaBaru = namaBaru.replace(regex, ` (${angkaBaru})`);
            } else {
                // Jika belum ada, tambahkan (1) di akhir nama
                namaBaru = `${namaBaru} (1)`;
            }
            
            // Panggil fungsi tambah item dengan menyertakan nama baru, harga lama, dan posisinya
            tambahItem(namaBaru, hargaSekarang, row);
        }

        function hapusItem(id) {
            const totalItem = document.querySelectorAll('.item-row').length;
            if (totalItem <= 2) {
                alert("Minimal harus ada 2 item untuk patungan!");
                return;
            }
            document.getElementById(id).remove();
        }

        function formatRupiah(angka) {
            return 'Rp ' + Math.round(angka).toLocaleString('id-ID');
        }

        function hitungPatungan() {
            const tagihanInput = document.getElementById('totalTagihan').value;
            const totalTagihan = parseFloat(tagihanInput);

            if (isNaN(totalTagihan) || totalTagihan <= 0) {
                alert("Masukkan total tagihan setelah diskon yang valid!");
                return;
            }

            const barisItems = document.querySelectorAll('.item-row');
            let totalHargaAsli = 0;
            let dataItem = [];

            // Kumpulkan nama dan harga dari tiap input
            barisItems.forEach((baris) => {
                const nama = baris.querySelector('.input-nama').value || 'Item Tanpa Nama';
                const harga = parseFloat(baris.querySelector('.input-harga').value);
                
                if (!isNaN(harga) && harga > 0) {
                    totalHargaAsli += harga;
                    dataItem.push({ nama: nama, hargaAsli: harga });
                }
            });

            if (dataItem.length < 2) {
                alert("Harap isi harga asli minimal 2 barang!");
                return;
            }

            const listHasil = document.getElementById('listHasil');
            listHasil.innerHTML = ''; 
            let totalTerkumpul = 0;

            // Hitung dan tampilkan output
            dataItem.forEach(item => {
                const bayar = (item.hargaAsli / totalHargaAsli) * totalTagihan;
                totalTerkumpul += bayar;

                const rowHasil = document.createElement('div');
                rowHasil.className = "flex justify-between items-center p-3 bg-white rounded-xl shadow-sm border border-indigo-50";
                rowHasil.innerHTML = `
                    <div class="pr-4">
                        <span class="block text-sm font-bold text-slate-800">${item.nama}</span>
                        <span class="block text-xs text-slate-500">Harga asli: ${formatRupiah(item.hargaAsli)}</span>
                    </div>
                    <span class="font-extrabold text-indigo-600 text-lg whitespace-nowrap">${formatRupiah(bayar)}</span>
                `;
                listHasil.appendChild(rowHasil);
            });

            document.getElementById('totalAsliText').innerText = formatRupiah(totalHargaAsli);
            document.getElementById('totalTerkumpulText').innerText = formatRupiah(totalTerkumpul);
            document.getElementById('hasilDiv').classList.remove('hidden');
        }
    </script>
</body>
</html>
